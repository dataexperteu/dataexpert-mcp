# CI/build pipeline for the Zoho MCP server.
#
# Per the repo convention, each server owns its own pipeline + version. This one:
#   - on PRs touching servers/zoho: typecheck + build (fast feedback, no publish)
#   - on a tag `zoho-v<semver>`: build + push the versioned image to GHCR
#
# The CSM compose pins ghcr.io/dataexperteu/dataexpert-mcp-zoho:<version>, so a
# release is just: tag `zoho-v0.1.0` -> image `…:0.1.0` -> bump ZOHO_MCP_VERSION.
#
# Hardening TODO (per the plan's CI/CD section): pin these actions to commit SHAs
# rather than major-version tags before this drives production deploys.

name: zoho-mcp

on:
  pull_request:
    paths:
      - 'servers/zoho/**'
      - '.github/workflows/zoho-ci.yml'
  push:
    tags:
      - 'zoho-v*'

defaults:
  run:
    working-directory: servers/zoho

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: servers/zoho/package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # prisma generate doesn't connect; a dummy URL satisfies the schema.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
      - run: npm run typecheck
      - run: npm run build

  publish:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/zoho-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dataexperteu/dataexpert-mcp-zoho
          tags: |
            type=match,pattern=zoho-v(.*),group=1
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: servers/zoho
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
